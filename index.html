<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STOCK///OVERVIEW</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <script src="/hacker-bg.js"></script>
  <body>
    <main class="crt-shell">
      <header class="topbar">
        <div class="brand">[ STOCK///OVERVIEW ]</div>
        <div class="status" id="statusText">READY</div>
      </header>

      <section class="controls">
        <label for="symbolInput">SYMBOL</label>
        <input id="symbolInput" type="text" value="IBM" maxlength="10" />

        <label for="apiKeyInput">MASSIVE.COM API KEY</label>
        <input id="apiKeyInput" type="password" placeholder="ENTER API KEY" />

        <button id="loadBtn" type="button">LOAD</button>
      </section>

      <section class="quote-panel">
        <div class="quote-row">
          <span>PRICE</span>
          <strong id="priceValue">--</strong>
        </div>
        <div class="quote-row">
          <span>CHANGE</span>
          <strong id="changeValue">--</strong>
        </div>
        <div class="quote-row">
          <span>UPDATED</span>
          <strong id="updatedValue">--</strong>
        </div>
      </section>

      <section class="range-panel">
        <button class="range-btn active" data-range="1H" type="button">1H</button>
        <button class="range-btn" data-range="1D" type="button">1D</button>
        <button class="range-btn" data-range="1W" type="button">1W</button>
        <button class="range-btn" data-range="1M" type="button">1M</button>
        <button class="range-btn" data-range="1Y" type="button">1Y</button>
        <button class="range-btn" data-range="ALL" type="button">ALL</button>
      </section>

      <section class="chart-panel">
        <canvas id="chartCanvas" width="1000" height="420" aria-label="Price chart"></canvas>
        <div class="chart-meta">
          <span id="minLabel">MIN: --</span>
          <span id="maxLabel">MAX: --</span>
          <span id="pointsLabel">POINTS: 0</span>
        </div>
      </section>

      <footer class="footnote">
        <span>DATA: MASSIVE.COM</span>
        <span>STYLE: MONO///RETRO</span>
      </footer>

      <!-- New: Top movers section (scroll below main chart to see) -->
      <section class="movers-panel">
        <div class="movers-head">
          <span>TOP 20 MOVERS /// WATCHLIST (FREE MODE)</span>
          <button id="refreshMoversBtn" type="button">REFRESH</button>
        </div>
        <div id="moversStatus" class="movers-status">READY</div>
        <div class="movers-table" id="moversTable"></div>
      </section>

      <!-- New: Premium-only details -->
      <section class="premium-panel">
        <div class="movers-head">
          <span>PREMIUM DATA DETAILS</span>
        </div>
        <div id="premiumDetails"></div>
      </section>
      <section class="premium-panel">
        <div class="movers-head">
          <span>PREMIUM SNAPSHOT FEATURE</span>
        </div>
        <div id="premiumSnapshot"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
